<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VMware vSphere Design – Practice Exam</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --blue: #388bfd;
    --blue-bg: #1c2d4b;
    --blue-border: #1f6feb;
    --green: #3fb950;
    --green-bg: #0f2d1a;
    --green-border: #238636;
    --red: #f85149;
    --red-bg: #2d1313;
    --red-border: #da3633;
    --yellow: #d29922;
    --yellow-bg: #2d2000;
    --radius: 8px;
    --radius-sm: 5px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    width: 32px; height: 32px;
    background: var(--blue);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0;
  }
  .header-title { font-weight: 600; font-size: 15px; }
  .header-sub { font-size: 12px; color: var(--muted); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .timer {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 12px;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
  }
  .timer.warning { color: var(--yellow); border-color: var(--yellow); }
  .timer.danger { color: var(--red); border-color: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

  /* ── PROGRESS ── */
  .progress-wrap {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-text { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* ── MAIN ── */
  .main { max-width: 800px; margin: 0 auto; padding: 28px 20px 60px; }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 18px;
  }
  .q-num {
    background: var(--blue-bg);
    border: 1px solid var(--blue-border);
    color: var(--blue);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .q-text { font-size: 15px; font-weight: 500; line-height: 1.55; white-space: pre-wrap; }
  .q-instruction {
    font-size: 12px;
    color: var(--yellow);
    background: var(--yellow-bg);
    border: 1px solid var(--yellow);
    border-radius: var(--radius-sm);
    padding: 5px 12px;
    margin-bottom: 16px;
    display: inline-block;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 9px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
  }
  .opt:hover:not(:disabled) { border-color: var(--blue-border); background: var(--blue-bg); }
  .opt.selected { border-color: var(--blue-border); background: var(--blue-bg); }
  .opt.correct { border-color: var(--green-border); background: var(--green-bg); color: var(--green); }
  .opt.wrong   { border-color: var(--red-border);   background: var(--red-bg);   color: var(--red); }
  .opt.missed  { border-color: var(--green-border); background: var(--green-bg); color: var(--green); opacity: 0.7; }
  .opt:disabled { cursor: default; }

  .opt-check {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
    transition: background 0.15s, border-color 0.15s;
  }
  .opt-check.round { border-radius: 50%; }
  .opt.selected .opt-check { background: var(--blue); border-color: var(--blue); }
  .opt.correct .opt-check  { background: var(--green); border-color: var(--green); }
  .opt.wrong .opt-check    { background: var(--red); border-color: var(--red); }
  .opt.missed .opt-check   { background: var(--green); border-color: var(--green); opacity: 0.7; }

  .check-icon { width: 10px; height: 10px; fill: #fff; }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 14px;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok  { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
  .feedback.err { background: var(--red-bg);   border: 1px solid var(--red-border);   color: var(--red); }

  /* ── NAV ── */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }
  .nav-info { font-size: 13px; color: var(--muted); }
  .btn-next {
    padding: 9px 22px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: none;
    transition: background 0.15s;
  }
  .btn-next:hover { background: #1a7fe8; }
  .btn-next.visible { display: block; }
  .btn-next.finish { background: var(--green); }
  .btn-next.finish:hover { background: #2ea043; }

  /* ── RESULTS ── */
  .results { display: none; }
  .results.show { display: block; }

  .result-hero {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    text-align: center;
    margin-bottom: 20px;
  }
  .result-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .result-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .score-display {
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }
  .score-display.pass { color: var(--green); }
  .score-display.fail { color: var(--red); }
  .score-label { font-size: 14px; color: var(--muted); margin-bottom: 22px; }
  .grade-badge {
    display: inline-block;
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }
  .grade-badge.pass { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .grade-badge.fail { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .stat-val { font-size: 28px; font-weight: 600; margin-bottom: 3px; }
  .stat-lbl { font-size: 12px; color: var(--muted); }
  .stat-box.s-correct .stat-val { color: var(--green); }
  .stat-box.s-wrong .stat-val { color: var(--red); }
  .stat-box.s-pct .stat-val { color: var(--blue); }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .fail-card {
    background: var(--bg2);
    border: 1px solid var(--red-border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
  }
  .fail-q { font-size: 14px; font-weight: 500; margin-bottom: 10px; color: var(--text); white-space: pre-wrap; }
  .fail-row { font-size: 13px; display: flex; gap: 8px; margin-top: 5px; align-items: flex-start; }
  .fail-label {
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; white-space: nowrap; margin-top: 1px; flex-shrink: 0;
  }
  .fail-label.yours { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .fail-label.right { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .fail-answer { color: var(--muted); }
  .fail-answer.ok { color: var(--green); }
  .fail-num { font-size: 11px; color: var(--muted); margin-bottom: 8px; }

  .btn-restart {
    padding: 10px 26px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  .btn-restart:hover { background: var(--bg3); }

  .restart-row { text-align: center; margin-top: 28px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

  .btn-review {
    padding: 10px 26px;
    background: var(--blue);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-review:hover { background: #1a7fe8; }

  /* ── REVIEW MODE ── */
  .review-section { display: none; }
  .review-section.show { display: block; }
  .review-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    margin-bottom: 14px;
  }
  .review-card.r-correct { border-color: var(--green-border); }
  .review-card.r-wrong   { border-color: var(--red-border); }
  .review-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-bottom: 12px;
  }
  .review-badge.ok  { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .review-badge.err { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  /* ── DRAG & DROP ── */
  .dd-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 4px; }
  .dd-col-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
  .dd-sources { display: flex; flex-direction: column; gap: 8px; }
  .dd-chip { padding: 9px 13px; background: var(--blue-bg); border: 1px solid var(--blue-border); border-radius: var(--radius-sm); font-size: 13px; color: var(--blue); cursor: grab; user-select: none; transition: opacity 0.15s; }
  .dd-chip:active { cursor: grabbing; }
  .dd-chip.dragging { opacity: 0.35; }
  .dd-chip.placed { opacity: 0.3; cursor: default; pointer-events: none; }
  .dd-chip.correct-chip { background: var(--green-bg); border-color: var(--green-border); color: var(--green); cursor: default; }
  .dd-chip.wrong-chip { background: var(--red-bg); border-color: var(--red-border); color: var(--red); cursor: default; }
  .dd-targets { display: flex; flex-direction: column; gap: 12px; }
  .dd-target-row { display: flex; flex-direction: column; gap: 5px; }
  .dd-drop { min-height: 40px; border: 1.5px dashed var(--border); border-radius: var(--radius-sm); display: flex; align-items: center; padding: 4px 8px; transition: border-color 0.15s, background 0.15s; }
  .dd-drop.over { border-color: var(--blue); background: var(--blue-bg); }
  .dd-drop.correct-drop { border-color: var(--green-border); background: var(--green-bg); border-style: solid; }
  .dd-drop.wrong-drop { border-color: var(--red-border); background: var(--red-bg); border-style: solid; }
  .dd-drop .dd-chip { margin: 0; padding: 4px 10px; font-size: 12px; }
  .dd-purpose { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .dd-check-btn { margin-top: 14px; padding: 9px 20px; background: var(--blue); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .dd-check-btn:hover { background: #1a7fe8; }
  .dd-check-btn:disabled { opacity: 0.4; cursor: default; }

  @media (max-width: 600px) {
    .dd-wrap { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 16px 12px 48px; }
    .header { padding: 12px 14px; }
    .score-display { font-size: 48px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">V</div>
  <div>
    <div class="header-title">VMware vSphere Design — Practice Exam</div>
    <div class="header-sub">VCP-DCV / 2V0-21.23</div>
  </div>
  <div class="header-right">
    <div class="timer" id="timer">00:00</div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 83</div>
</div>

<div class="main">

  <!-- EXAM SECTION -->
  <div id="examSection">
    <div class="q-card">
      <div class="q-header">
        <span class="q-num" id="qNum">Q1</span>
        <p class="q-text" id="qText"></p>
      </div>
      <div id="qInstruction"></div>
      <div class="options" id="optsList"></div>
      <div class="feedback" id="feedbackBox"></div>
    </div>
    <div class="nav">
      <span class="nav-info" id="navInfo"></span>
      <button class="btn-next" id="btnNext">Next →</button>
    </div>
  </div>

  <!-- RESULTS SECTION -->
  <div class="results" id="resultsSection">
    <div class="result-hero">
      <div class="result-title">Exam Complete</div>
      <div class="result-sub">VMware NSX Practice Test</div>
      <div class="score-display" id="scoreDisplay">0%</div>
      <div class="score-label" id="scoreLabel">0 correct of 83 questions</div>
      <span class="grade-badge" id="gradeBadge">—</span>
    </div>

    <div class="stats-grid">
      <div class="stat-box s-correct">
        <div class="stat-val" id="statCorrect">0</div>
        <div class="stat-lbl">Correct</div>
      </div>
      <div class="stat-box s-wrong">
        <div class="stat-val" id="statWrong">0</div>
        <div class="stat-lbl">Incorrect</div>
      </div>
      <div class="stat-box s-pct">
        <div class="stat-val" id="statTime">0:00</div>
        <div class="stat-lbl">Time taken</div>
      </div>
    </div>

    <div id="failuresWrap"></div>

    <div class="restart-row">
      <button class="btn-restart" onclick="restart()">↺ Restart Exam</button>
      <button class="btn-review" onclick="showReview()">Review All Questions</button>
    </div>
  </div>

  <!-- REVIEW SECTION -->
  <div class="review-section" id="reviewSection">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
      <div style="font-size:16px; font-weight:600;">Full Review</div>
      <button class="btn-restart" onclick="backToResults()">← Back to results</button>
    </div>
    <div id="reviewContent"></div>
  </div>

</div>

<script>
const QUESTIONS = [{"q": "Following a review of security requirements, an architect has confirmed the following requirements:\nREQ001- A clustered firewall solution must be placed at the perimeter of the hosting platform, and all ingress and egress network traffic will route via this device.\nREQ002- A distributed firewall solution must secure traffic for all virtualized workloads.\nREQ003- All virtualized workload, hypervisor, firewall and any management component system events must be monitored by security administrators.\nREQ004- The hosting platforms security information and event management (SIEM) system must be scalable to 20,000 events per second.\nREQ005- The hosting platforms storage must be configured with data-at-rest encryption.\nREQ006- The hosting platform limits access to authorized users.\nWhich three requirements would be classified as technical (formerly non-functional) requirements? (Choose three.)", "opts": ["A clustered firewall solution must be placed at the perimeter of the hosting platform, and all ingress and egress network traffic will route via this device.", "A distributed firewall solution must secure traffic for all virtualized workloads.", "The hosting platforms security information and event management (SIEM) system must be scalable to 20,000 events per second.", "The hosting platforms storage must be configured with data-at-rest encryption.", "The hosting platform limits access to authorized users.", "All virtualized workload, hypervisor, firewall and any management component system events must be monitored by security administrators."], "correct": [2, 3, 4]}, {"q": "An architect is designing a solution for a customer to meet the following business objectives:\nPass compliance audits -\nReuse compute hardware -\nGrow by 10% per year -\nMove to a subscription-based consumption model\nWhich business objective translates as a conceptual model constraint?", "opts": ["Pass compliance audits", "Reuse compute hardware", "Move to a subscription-based consumption model", "Grow by 10% per year"], "correct": [1]}, {"q": "A company is expanding and will be deploying new vSphere environments in multiple new locations. All environments use datastores backed by multiple storage technologies and vendors.\nHow can the architect create a design to efficiently and repeatedly distribute existing company virtual machine (VM) templates to multiple new locations?", "opts": ["Use storage array replication tools to replicate the storage volume holding the company VM templates to each remote site.", "Upload company templates to a cloud provider and download to each new location.", "Create a published content library and have the new locations subscribe to it.", "Create a local content library at each site and manually copy only needed templates."], "correct": [2]}, {"q": "An architect is documenting the design decisions for a new vSphere solution. The following design decision has been made:\nCreate a separate vSphere cluster for the management workloads\nWhat could the architect include as justification for this design decision?", "opts": ["This increases operational overhead as multiple clusters are required for management and compute workloads.", "This increases capital expenditure as hardware must be purchased for multiple clusters.", "This ensures that compute workloads have no impact on the management workloads.", "This ensures that there is always sufficient capacity available for the compute workloads."], "correct": [2]}, {"q": "An architect is tasked with designing a repeatable edge hosting solution using VMware technologies that can be deployed to existing hotels across the world and operate independently of other locations.\nDuring interviews with stakeholders, the architect notes the following information:\nThere are 123 hotels in total.\nAll hotels have a minimum of two 1 Gbps connections for guest Internet access.\nThe company operates hotels in four countries: Canada, USA, Cuba and Mexico.\nThe company is rebranding the hotels located in Mexico.\nWhich of these is a business factor that will impact this design?", "opts": ["The company is rebranding the hotels located in Mexico.", "The company operates hotels in four countries: Canada, USA, Cuba and Mexico.", "There are 123 hotels in total", "All hotels have a minimum of two 1 Gbps connections for guest Internet access."], "correct": [0]}, {"q": "The following is a list of requirements from a discovery workshop for a new VMware hosting platform system design:\nREQ001 - The architecture must support recoverability to the VMware Cloud Disaster Recovery (VCDR) service.\nREQ002 - The architecture must support high availability (HA) and fault tolerance (FT).\nREQ003 - The architecture must support reducing existing energy consumption and carbon footprint.\nREQ004 - The architecture must provide support for network virtualization using distributed virtual switches.\nWhich requirement would be classified as a business (formerly functional) requirement?", "opts": ["The architecture must support high availability (HA) and fault tolerance (FT).", "The architecture must support reducing existing energy consumption and carbon footprint.", "The architecture must support recoverability to the VMware Cloud Disaster Recovery (VCDR) service.", "The architecture must provide support for network virtualization using distributed virtual switches."], "correct": [1]}, {"q": "An architect is working on a new VMware vSphere design and notes the following information during interviews with stakeholders:\nThe company has previously worked with multiple VMware partners\nThe company has an internal security policy that is referenced in long running contracts\nThe company has an Enterprise License Agreement (ELA) with VMware\nThe company has a multi-year cloud subscription agreement\nWhich of these is a business factor that will impact this design?", "opts": ["The company has previously worked with multiple VMware partners.", "The company has an Enterprise License Agreement (ELA) with VMware.", "The company has an internal security policy that is referenced in long running contracts.", "The company has a multi-year cloud subscription agreement."], "correct": [3]}, {"q": "An architect is designing an upgrade to an existing vSphere environment. The project has been created to provide options for enabling growth and scalability, without increasing the data center footprint. The CIO has also tasked the architect with updating data protection operations, from the current agent-based backup approach.\nDuring a workshop with key stakeholders, the following information has been noted:\nThe existing vSphere environment uses an external fibre attached storage array for the vSphere environment\nThe storage array is connected via 4 Gbps fibre cards host bus adaptors (HBAs)\nThe storage array does not support VMware Storage APIs-Data Protection (VADP)\nThe architecture must support scaling virtual machines CPU, memory, and storage\nThe environment will grow by an additional 20% virtual machines year over year\nOnly two additional racks of equipment can be provisioned\nWhich design choice will meet these requirements?", "opts": ["The architecture will extend the Fibre Channel external storage array, scaling out storage and compute by buying additional storage or server capacity as required.", "The architecture will replace the Fibre Channel storage array with an updated model, scaling out storage capacity as required.", "The architecture will be based on vSAN Ready Nodes, scaling out storage and compute by buying additional hyper-converged servers as required.", "The architecture will be based on stretched vSAN Ready Nodes, scaling out storage and compute by buying additional hyper-converged servers as required."], "correct": [2]}, {"q": "An architect is responsible for extending the hosting design for a customer. The customer has a mission-critical 3-node application which is load balanced in an active/active/passive c ked NSX segments", "A dedicated distributed virtual switch and dedicated port groups", "VLAN-backed NSX segments", "A dedicated NSX segment configured manually"], "correct": [0]}, {"q": "An architect is working with stakeholders to define requirements for architecting a new VMware vSphere design.\nWhat are two strategies for engaging with stakeholders to achieve this goal? (Choose two.)", "opts": ["The architect conducts workshops with the virtualization technical team to gather deployment justifications.", "The architect conducts workshops and interviews limited to those stakeholders identified in the assessment phase of the project.", "The architect conducts workshops with stakeholders to gather business and technical requirements.", "The architect conducts multiple rounds of interviews with stakeholders, iteratively refining requirements.", "The architect conducts interviews focusing on business requirements to build the architectural business case."], "correct": [2, 3]}, {"q": "An architect is updating an existing design to include a new vSphere cluster to meet the following customer requirements:\nThe solution must provide automatic load redistribution of workloads across all resources in the cluster\nThe solution must consider the usage patterns of workloads when performing load redistribution\nThe solution must provide capacity to reserve resources equal to two ESXi hosts for failover in the event of a host failure\nA001 - Budget is available for additional hardware and software if required to meet the solution requirements\nA002 - Capacity is available to allow the deployment of additional tooling to manage the solution\nC001 - All management workloads must be deployed to the existing vSphere management cluster\nWhich three design decisions should the architect include to meet the documented requirements? (Choose three.)", "opts": ["The solution will enable the Predictive DRS option to avoid host over-commitment.", "The solution will enable the Memory Metric istributed Resource Scheduler (DRS) with SmartNICs in the ESXi host hardware"], "correct": [2]}, {"q": "Which is a benefit of using vSAN stretched clusters in VMware Cloud Foundation?", "opts": ["To enable high availability of virtual machines across different availability zones", "To reduce the cost by eliminating the need for additional hardware and software components", "To simplify physical network configurations by automatically configuring the required network components", "To improve application performance by reducing network latency between availability zones"], "correct": [0]}, {"q": "An architect is documenting the logical design for a new vSphere solution. The following requirements have been provided to the architect by the customer for the design:\nThe solution must be deployed in two locations: DC1 and DC2\nThe solution must limit the impact radius of accidental changes by administrators\nThe solution must meet a recovery time objective (RTO) of four (4) hours and recovery point objective (RPO) of 24 hours\nThe solution must allow workloads to run in both DC1 and DC2 during normal operations\nThe solution must allow workloads to be moved bi-directionally between DC1 and DC2\nThe solution must use hyper-converged infrastructure for the virtual machine storage\nThe network connection between DC1 and DC2 has a 10 Gbps bandwidth with a maximum round trip latency of 4 ms.\nThe architect recommends: Use separate clusters in DC1 and DC2 to form a multi-region design\nWhat should the architect include as justification for this design decision?", "opts": ["Sufficient capacity must be deployed in both DC1 and DC2 to support all running virtual machines.", "Using separate clusters mitigates the risk of an accidental change at the cluster level in DC1 from impacting DC2.", "Using separate clusters is the only configuration available that supports the RTO of four (4) hours.", "The network connection between DC1 and DC2 does not support the use of stretched clusters."], "correct": [1]}, {"q": "What is an example of a performance design quality?", "opts": ["The solution must scale to meet spikes in CPU demand.", "The solution must provide 40 physical CPU cores and 20 TB of physical memory.", "The solution must support applications with a maximum tolerable downtime (MTD) of four hours.", "The solution must support applications with 1,000 transactions per second (TPS)."], "correct": [3]}, {"q": "An architect is responsible for designing a vSphere-based solution for a customer. The customer has the following requirements:\nThe solution must provide redundancy and load balancing for storage traffic\nThe solution must tolerate at least one failure\nThere must be no single point of failure in the solution\nWhich three considerations regarding physical host design should the architect analyze when making storage related design decisions? (Choose three.)", "opts": ["Configure the fixed multi-pathing policy on the ESXi hosts", "Use four single port storage host bus adapters (HBAs) in each ESXi host", "Use an active-active array for Fibre Channel storage-based VMFS datastores", "Configure a minimum of two paths to every LUN or datastore", "Configure a minimum of four paths to every LUN or datastore", "Use one quad-port storage host bus adapter (HBA) in each ESXi host"], "correct": [1, 2, 4]}, {"q": "Which two vSphere cluster-related design details would an architect document in a physical design? (Choose two.)", "opts": ["The solution will set the isolation.tools.diskshrink,disable advanced setting to true.", "The solution will set the das.isolationaddress advanced setting to 192.168.100.2.", "The solution will deploy a dedicated VMware Management Cluster into the primary site.", "The solution will configure vSphere High Availability (HA)."], "correct": [1, 2]}, {"q": "An architect is responsible for designing a vSphere-based solution for a customer. The customer has the following requirement:\nThere should be no single points of failure within the solution.\nWhich three considerations regarding physical host design should an architect analyze when making network teaming-related design decisions? (Choose three.)", "opts": ["NIC Teaming requires a minimum of three physical network connections.", "For NIC Teaming, all NICs in the same port group must be in the same layer 2 broadcast domain.", "To increase performance, the NICs within a NIC team should be from the same physical NIC Card.", "To increase availability, the NICs within a NIC team should be from different physical NIC Cards.", "NIC Teaming requires a minimum of two physical network connections.", "For NIC Teaming, all NICs in the same port group must be in the same routable network."], "correct": [1, 3, 4]}, {"q": "An architect is responsible for designing a new vSphere-based solution to meet the following customer requirements:\nThe solution must support component-level redundancy.\nThe solution must support physical segregation of management and workload traffic.\nAny traffic from virtual infrastructure-level operations must not impact any workload.\nThe solution should react to any substantial impact of physical network traffic to ensure workload traffic is unaffected.\nThe solution will separate vSphere management traffic from all other network traffic.\nThe solution will ensure that all replication and vMotion traffic will be separated from all other traffic.\nThe solution will separate workload traffic from all other network traffic.\nThe customer has a hardware standard: 6 x 10 GbE network.\nWhich three physical design decisions should the architect make to meet the requirements? (Choose three.)", "opts": ["The solution will configure the Route Based on Source MAC Hash load balancing method.", "The solution will deploy three (3) vSphere standard switches each with a single uplink port group.", "The solution will configure the six (6) available network connections into load balanced pairs.", "The solution will deploy a vSphere distributed switch with three (3) uplink port groups.", "The solution will configure the six (6) available network connections into a single load balanced group.", "The solution will configure the Route Based on Physical NIC Load load balancing method."], "correct": [2, 3, 5]}, {"q": "An architect is designing a new vSphere solution. The following information has been gathered during the design workshops with the customer:\nThe solution will be deployed into two availability zones (AZs)\nThe solution will be configured as a single stretched cluster with shared storage across the two AZs\nProduction and Development workloads will run across both AZs\nThe cluster is configured as N + 1\nThe architect needs to ensure that, in the event of a host failure during maintenance of another host in the cluster, only the Production workloads are recovered.\nWhat should the architect include in the design to meet this requirement?", "opts": ["Configure vSphere HA VM Monitoring to VM and Application Monitoring\nSet the VM monitoring sensitivity to Custom", "Configure vSphere HA VM Monitoring to VM Monitoring only\nSet the VM monitoring sensitivity to Preset of High", "Configure vSphere HA Host Failure Response to Restart VMs\nSet the Development VMs to Disabled as the Restart Priority", "Configure vSphere HA Host Failure Response to Restart VMs\nSet the cluster default Restart VM Restart Priority to Highest"], "correct": [2]}, {"q": "An architect is reviewing the information gathered from an initial requirements gathering workshop.\nREQ001 - The architecture must support tracking of administrative logons and actions.\nREQ002 - The architecture must support class three (three nines or 99.9%) system availability.\nREQ003 - The architecture must report on system usage in terms of CPU, memory, storage and network.\nREQ004 - The architecture must provide for system recovery point objective (RPO) of two hours.\nREQ005 - The architecture must provide access to a precision time protocol (PTP) ally separate the NSX host overlay network traffic from other management networks flows.\nWhich design decision should the architect make to meet this requirement?", "opts": ["Deploy the new workload domain with NSX Federation.", "Deploy the new workload domain using multiple physical adapters.", "Deploy the new workload domain using SDDC Manager.", "Deploy the new workload domain using API."], "correct": [1]}, {"q": "An architect is designing the access management component of a vSphere-based solution. During a requirements gathering workshop, the customer states that the architecture must use a centralized user authentication solution.\nThe architect decides that an Open Lightweight Directory Access Protocol (OpenLDAP) solution would meet the requirement. The security team intervenes and requires that the solution use the corporate Active Directory Domain Services solution.\nAt which point did the architect's design become constrained?", "opts": ["When the customer provided the requirement for the use a centralized user authentication solution.", "When the architect made the design decision to use an OpenLDAP solution for user authentication.", "When the architect finished documenting all of the requirements.", "When the customer required the use of the corporate Active Directory Domain Services solution."], "correct": [3]}, {"q": "A company has a requirement that all production applications must have a maximum tolerable downtime (MTD) of one hour per month.\nWhich statement would be included in the physical design to support this requirement?", "opts": ["vSphere HA will be enabled on all clusters.", "vSphere HA Host Failure Response will be set to Restart VMs.", "vSphere Fault Tolerance (FT) will not be enabled for the production applications.", "Server hardware has already been purchased for the production applications."], "correct": [1]}, {"q": "An architect is designing a new vSphere solution. The solution will be used to host workloads that have multiple depe const TOTAL = QUESTIONS.length;
let current = 0;
let score = 0;
let answered = false;
let selected = [];
let failures = [];
let userAnswers = [];
let startTime = Date.now();
let timerInterval;
let elapsedSecs = 0;
let EXAM = []; // shuffled questions for this session

// Shuffle array (Fisher-Yates)
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Build a shuffled exam: randomize question order AND option order
// Correct indices are remapped to match the new option positions
function buildExam() {
  // Shuffle regular questions + options
  const shuffledQs = shuffle(QUESTIONS).map(q => {
    const indexed = q.opts.map((text, i) => ({ text, origIdx: i }));
    const shuffledOpts = shuffle(indexed);
    const correctSet = new Set(q.correct);
    const newCorrect = shuffledOpts
      .map((opt, newIdx) => correctSet.has(opt.origIdx) ? newIdx : -1)
      .filter(i => i !== -1);
    return { q: q.q, opts: shuffledOpts.map(o => o.text), correct: newCorrect };
  });
  return shuffledQs;
}

// Start timer
function startTimer() {
  timerInterval = setInterval(() => {
    elapsedSecs++;
    const m = String(Math.floor(elapsedSecs / 60)).padStart(2, '0');
    const s = String(elapsedSecs % 60).padStart(2, '0');
    const el = document.getElementById('timer');
    el.textContent = m + ':' + s;
  }, 1000);
}

const CHECK_SVG = `<svg class="check-icon" viewBox="0 0 12 12"><polyline points="1.5,6 4.5,9 10.5,3" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const X_SVG = `<svg class="check-icon" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="white" stroke-width="1.8" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>`;

function render() {
  const q = EXAM[current];

  document.getElementById('progressFill').style.width = ((current / TOTAL) * 100) + '%';
  document.getElementById('progressText').textContent = (current) + ' / ' + TOTAL;
  document.getElementById('qNum').textContent = 'Q' + (current + 1);
  document.getElementById('qText').textContent = q.q;

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback';
  fb.textContent = '';

  const btn = document.getElementById('btnNext');
  btn.className = 'btn-next';
  btn.textContent = current === TOTAL - 1 ? 'Finish Exam' : 'Next →';
  if (current === TOTAL - 1) btn.classList.add('finish');

  document.getElementById('navInfo').textContent = '';
  answered = false;
  selected = [];

  if (q.type === 'dragdrop') {
    renderDragDrop(q);
  } else {
    renderMCQ(q);
  }
}

function renderMCQ(q) {
  const isMulti = q.correct.length > 1;
  const instrEl = document.getElementById('qInstruction');
  if (isMulti) {
    instrEl.innerHTML = '<span class="q-instruction">Select ' + q.correct.length + ' answers</span>';
  } else {
    instrEl.innerHTML = '';
  }
  const list = document.getElementById('optsList');
  list.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    const checkClass = isMulti ? 'opt-check' : 'opt-check round';
    btn.innerHTML = `<span class="${checkClass}" id="chk${i}"></span><span>${opt}</span>`;
    btn.onclick = () => toggleOption(i);
    list.appendChild(btn);
  });
}

// ── DRAG & DROP RENDER ──
let ddState = {}; // { dropIdx: labelText or null }
let dragItem = null;

function renderDragDrop(q) {
  document.getElementById('qInstruction').innerHTML = '<span class="q-instruction">Drag each item to its matching purpose</span>';
  ddState = {};
  q.items.forEach((_, i) => ddState[i] = null);

  const list = document.getElementById('optsList');
  list.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'dd-wrap';

  // Left col: draggable chips
  const leftCol = document.createElement('div');
  leftCol.innerHTML = '<div class="dd-col-title">Recommendations</div>';
  const sources = document.createElement('div');
  sources.className = 'dd-sources';
  sources.id = 'ddSources';

  q.items.forEach((item, i) => {
    const chip = document.createElement('div');
    chip.className = 'dd-chip';
    chip.textContent = item.label;
    chip.dataset.label = item.label;
    chip.draggable = true;
    chip.id = 'chip_' + i;

    // Desktop drag
    chip.addEventListener('dragstart', e => {
      dragItem = chip;
      chip.classList.add('dragging');
      e.dataTransfer.setData('text/plain', item.label);
    });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));

    // Touch drag
    chip.addEventListener('touchstart', touchStart, {passive:true});
    chip.addEventListener('touchmove', touchMove, {passive:false});
    chip.addEventListener('touchend', touchEnd);

    sources.appendChild(chip);
  });

  leftCol.appendChild(sources);

  // Right col: drop zones
  const rightCol = document.createElement('div');
  rightCol.innerHTML = '<div class="dd-col-title">Purposes</div>';
  const targets = document.createElement('div');
  targets.className = 'dd-targets';

  q.items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'dd-target-row';

    const drop = document.createElement('div');
    drop.className = 'dd-drop';
    drop.dataset.idx = i;
    drop.id = 'drop_' + i;

    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('over'));
    drop.addEventListener('drop', e => {
      e.preventDefault();
      drop.classList.remove('over');
      const label = e.dataTransfer.getData('text/plain');
      placeChip(label, i);
    });

    const purpose = document.createElement('div');
    purpose.className = 'dd-purpose';
    purpose.textContent = item.purpose;

    row.appendChild(drop);
    row.appendChild(purpose);
    targets.appendChild(row);
  });

  rightCol.appendChild(targets);
  wrap.appendChild(leftCol);
  wrap.appendChild(rightCol);
  list.appendChild(wrap);

  // Check button
  const checkBtn = document.createElement('button');
  checkBtn.className = 'dd-check-btn';
  checkBtn.id = 'ddCheckBtn';
  checkBtn.textContent = 'Check Answers';
  checkBtn.disabled = true;
  checkBtn.onclick = () => confirmDragDrop(q);
  list.appendChild(checkBtn);
}

function placeChip(label, dropIdx) {
  const q = EXAM[current];
  // If drop already has a chip, return it to source
  if (ddState[dropIdx] !== null) {
    returnChipToSource(ddState[dropIdx]);
  }
  // If chip was in another drop, clear that drop
  Object.keys(ddState).forEach(k => {
    if (ddState[k] === label && parseInt(k) !== dropIdx) {
      ddState[k] = null;
      document.getElementById('drop_' + k).innerHTML = '';
    }
  });

  ddState[dropIdx] = label;

  const drop = document.getElementById('drop_' + dropIdx);
  drop.innerHTML = '';
  const mini = document.createElement('div');
  mini.className = 'dd-chip';
  mini.textContent = label;
  mini.dataset.label = label;
  mini.style.cursor = 'pointer';
  mini.title = 'Click to remove';
  mini.onclick = () => { returnChipToSource(label); ddState[dropIdx] = null; drop.innerHTML = ''; updateDDCheck(); };
  drop.appendChild(mini);

  // Mark source as placed
  const sourceChip = document.querySelector('#ddSources .dd-chip[data-label="' + CSS.escape(label) + '"]');
  if (sourceChip) sourceChip.classList.add('placed');

  updateDDCheck();
}

function returnChipToSource(label) {
  const sourceChip = document.querySelector('#ddSources .dd-chip[data-label="' + CSS.escape(label) + '"]');
  if (sourceChip) sourceChip.classList.remove('placed');
}

function updateDDCheck() {
  const allPlaced = Object.values(ddState).every(v => v !== null);
  const btn = document.getElementById('ddCheckBtn');
  if (btn) btn.disabled = !allPlaced;
}

function confirmDragDrop(q) {
  answered = true;
  let correct = true;
  q.items.forEach((item, i) => {
    const drop = document.getElementById('drop_' + i);
    const placed = ddState[i];
    const isRight = placed === item.label;
    if (!isRight) correct = false;
    drop.classList.add(isRight ? 'correct-drop' : 'wrong-drop');
    if (drop.firstChild) drop.firstChild.classList.add(isRight ? 'correct-chip' : 'wrong-chip');
  });

  document.getElementById('ddCheckBtn').disabled = true;
  // Disable source chips
  document.querySelectorAll('#ddSources .dd-chip').forEach(c => { c.draggable = false; c.style.pointerEvents = 'none'; });

  if (correct) {
    score++;
    const fb = document.getElementById('feedbackBox');
    fb.className = 'feedback ok show';
    fb.innerHTML = '✓ Correct! All items matched correctly.';
  } else {
    const fb = document.getElementById('feedbackBox');
    const correctMap = q.items.map(it => it.label + ' → ' + it.purpose.substring(0, 40) + '...').join('<br>');
    fb.className = 'feedback err show';
    fb.innerHTML = '✗ Incorrect. Correct matches:<br>' + correctMap;
    failures.push({ idx: current, selected: [], isDragDrop: true, ddState: {...ddState}, q });
  }

  userAnswers[current] = { selected: [], correct, isDragDrop: true, ddState: {...ddState}, qItems: q.items };
  document.getElementById('btnNext').classList.add('visible');
  document.getElementById('progressText').textContent = (current + 1) + ' / ' + TOTAL;
  document.getElementById('progressFill').style.width = (((current + 1) / TOTAL) * 100) + '%';
}

// ── TOUCH DRAG ──
let touchClone = null;
let touchSourceChip = null;

function touchStart(e) {
  touchSourceChip = e.currentTarget;
  const rect = touchSourceChip.getBoundingClientRect();
  touchClone = touchSourceChip.cloneNode(true);
  touchClone.style.cssText = 'position:fixed;pointer-events:none;opacity:0.8;z-index:9999;width:' + rect.width + 'px;';
  touchClone.style.left = rect.left + 'px';
  touchClone.style.top = rect.top + 'px';
  document.body.appendChild(touchClone);
}

function touchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  touchClone.style.left = (t.clientX - 60) + 'px';
  touchClone.style.top  = (t.clientY - 20) + 'px';
  document.querySelectorAll('.dd-drop').forEach(d => d.classList.remove('over'));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const drop = el ? el.closest('.dd-drop') : null;
  if (drop) drop.classList.add('over');
}

function touchEnd(e) {
  if (touchClone) { touchClone.remove(); touchClone = null; }
  document.querySelectorAll('.dd-drop').forEach(d => d.classList.remove('over'));
  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const drop = el ? el.closest('.dd-drop') : null;
  if (drop && touchSourceChip) {
    placeChip(touchSourceChip.dataset.label, parseInt(drop.dataset.idx));
  }
  touchSourceChip = null;
}

function toggleOption(idx) {
  if (answered) return;
  const q = EXAM[current];
  if (q.type === 'dragdrop') return;
  const isMulti = q.correct.length > 1;
  const btns = document.querySelectorAll('.opt');

  if (!isMulti) {
    // single select — confirm immediately
    selected = [idx];
    confirmAnswer();
    return;
  }

  // multi select — toggle
  const pos = selected.indexOf(idx);
  if (pos === -1) {
    if (selected.length < q.correct.length) {
      selected.push(idx);
      btns[idx].classList.add('selected');
      document.getElementById('chk' + idx).innerHTML = CHECK_SVG;
    }
  } else {
    selected.splice(pos, 1);
    btns[idx].classList.remove('selected');
    document.getElementById('chk' + idx).innerHTML = '';
  }

  const navInfo = document.getElementById('navInfo');
  navInfo.textContent = selected.length + ' / ' + q.correct.length + ' selected';

  if (selected.length === q.correct.length) {
    confirmAnswer();
  }
}

function confirmAnswer() {
  if (answered) return;
  answered = true;

  const q = EXAM[current];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);

  const correctSet = new Set(q.correct);
  const selectedSet = new Set(selected);
  const isCorrect = q.correct.length === selected.length && q.correct.every(c => selectedSet.has(c));

  // Color options
  btns.forEach((btn, i) => {
    const chk = document.getElementById('chk' + i);
    if (selectedSet.has(i) && correctSet.has(i)) {
      btn.classList.add('correct');
      chk.innerHTML = CHECK_SVG;
    } else if (selectedSet.has(i) && !correctSet.has(i)) {
      btn.classList.add('wrong');
      chk.innerHTML = X_SVG;
    } else if (!selectedSet.has(i) && correctSet.has(i)) {
      btn.classList.add('missed');
      chk.innerHTML = CHECK_SVG;
    }
  });

  const fb = document.getElementById('feedbackBox');
  if (isCorrect) {
    score++;
    fb.className = 'feedback ok show';
    fb.innerHTML = '✓ Correct!';
  } else {
    const correctLabels = q.correct.map(c => q.opts[c]).join(', ');
    fb.className = 'feedback err show';
    fb.innerHTML = '✗ Incorrect. Correct answer' + (q.correct.length > 1 ? 's' : '') + ': <strong>' + correctLabels + '</strong>';
    failures.push({ idx: current, selected: [...selected] });
  }

  userAnswers[current] = { selected: [...selected], correct: isCorrect };
  document.getElementById('navInfo').textContent = '';
  document.getElementById('btnNext').classList.add('visible');
  document.getElementById('progressText').textContent = (current + 1) + ' / ' + TOTAL;
  document.getElementById('progressFill').style.width = (((current + 1) / TOTAL) * 100) + '%';
}

document.getElementById('btnNext').addEventListener('click', () => {
  current++;
  if (current >= TOTAL) showResults();
  else render();
});

function showResults() {
  clearInterval(timerInterval);
  document.getElementById('examSection').style.display = 'none';
  document.getElementById('resultsSection').className = 'results show';

  const pct = Math.round((score / TOTAL) * 100);
  const pass = pct >= 70;

  document.getElementById('scoreDisplay').textContent = pct + '%';
  document.getElementById('scoreDisplay').className = 'score-display ' + (pass ? 'pass' : 'fail');
  document.getElementById('scoreLabel').textContent = score + ' correct of ' + TOTAL + ' questions';

  const badge = document.getElementById('gradeBadge');
  badge.textContent = pass ? '✓ PASS' : '✗ NEEDS IMPROVEMENT';
  badge.className = 'grade-badge ' + (pass ? 'pass' : 'fail');

  document.getElementById('statCorrect').textContent = score;
  document.getElementById('statWrong').textContent = TOTAL - score;
  const m = String(Math.floor(elapsedSecs / 60)).padStart(2, '0');
  const s = String(elapsedSecs % 60).padStart(2, '0');
  document.getElementById('statTime').textContent = m + ':' + s;

  // Build failures section
  const wrap = document.getElementById('failuresWrap');
  if (failures.length === 0) {
    wrap.innerHTML = '<div style="text-align:center; padding:20px; color:var(--green)">🎉 Perfect score! No failures.</div>';
  } else {
    let html = '<div class="section-title" style="margin-top:8px">Incorrect Answers (' + failures.length + ')</div>';
    failures.forEach((f, fi) => {
      const q = EXAM[f.idx];
      let yourAns, rightAns;
      if (f.isDragDrop) {
        const items = f.q ? f.q.items : q.items;
        yourAns = Object.entries(f.ddState).map(([i, lbl]) => (lbl || '(empty)') + ' → ' + (items[i] ? items[i].purpose.substring(0,40)+'...' : '')).join('<br>');
        rightAns = items.map(it => it.label + ' → ' + it.purpose.substring(0,40)+'...').join('<br>');
      } else {
        yourAns = f.selected.map(i => q.opts[i]).join(', ') || '(none)';
        rightAns = q.correct.map(i => q.opts[i]).join(', ');
      }
      html += `<div class="fail-card">
        <div class="fail-num">Question ${f.idx + 1}</div>
        <div class="fail-q">${q.q}</div>
        <div class="fail-row"><span class="fail-label yours">Your answer</span><span class="fail-answer">${yourAns}</span></div>
        <div class="fail-row"><span class="fail-label right">Correct</span><span class="fail-answer ok">${rightAns}</span></div>
      </div>`;
    });
    wrap.innerHTML = html;
  }
}

function showReview() {
  document.getElementById('resultsSection').className = 'results';
  document.getElementById('reviewSection').className = 'review-section show';

  let html = '';
  EXAM.forEach((q, i) => {
    const ua = userAnswers[i];
    const isCorrect = ua && ua.correct;
    let optsHtml = '';

    if (q.type === 'dragdrop') {
      const items = ua ? ua.qItems : q.items;
      items.forEach((item, j) => {
        const placed = ua ? ua.ddState[j] : null;
        const right = placed === item.label;
        const cls = !ua ? '' : (right ? 'correct' : 'wrong');
        const icon = right ? CHECK_SVG : (ua ? X_SVG : '');
        optsHtml += `<div class="opt ${cls}" style="cursor:default;margin-bottom:7px"><span class="opt-check round">${icon}</span><span><strong>${placed || '(not placed)'}</strong> → ${item.purpose.substring(0,60)}...</span></div>`;
      });
    } else {
      const correctSet = new Set(q.correct);
      const selectedSet = ua ? new Set(ua.selected) : new Set();
      q.opts.forEach((opt, j) => {
        let cls = '';
        if (selectedSet.has(j) && correctSet.has(j)) cls = 'correct';
        else if (selectedSet.has(j) && !correctSet.has(j)) cls = 'wrong';
        else if (!selectedSet.has(j) && correctSet.has(j)) cls = 'missed';
        const icon = cls === 'correct' || cls === 'missed' ? CHECK_SVG : (cls === 'wrong' ? X_SVG : '');
        const chkCls = q.correct.length > 1 ? 'opt-check' : 'opt-check round';
        optsHtml += `<div class="opt ${cls}" style="cursor:default;margin-bottom:7px"><span class="${chkCls}">${icon}</span><span>${opt}</span></div>`;
      });
    }

    html += `<div class="review-card ${isCorrect ? 'r-correct' : 'r-wrong'}">
      <span class="review-badge ${isCorrect ? 'ok' : 'err'}">${isCorrect ? '✓ Correct' : '✗ Incorrect'}</span>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Q${i+1}${q.type === 'dragdrop' ? ' · Drag & Drop' : ''}</div>
      <div style="font-weight:500;margin-bottom:14px;white-space:pre-wrap">${q.q}</div>
      ${optsHtml}
    </div>`;
  });

  document.getElementById('reviewContent').innerHTML = html;
  window.scrollTo(0, 0);
}

function backToResults() {
  document.getElementById('reviewSection').className = 'review-section';
  document.getElementById('resultsSection').className = 'results show';
  window.scrollTo(0, 0);
}

function restart() {
  current = 0;
  score = 0;
  answered = false;
  selected = [];
  failures = [];
  userAnswers = [];
  elapsedSecs = 0;
  EXAM = buildExam();
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('resultsSection').className = 'results';
  document.getElementById('reviewSection').className = 'review-section';
  document.getElementById('examSection').style.display = 'block';
  startTimer();
  render();
  window.scrollTo(0, 0);
}

EXAM = buildExam();
startTimer();
render();
</script>
</body>
</html>
